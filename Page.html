      background: #fff;
      padding: 18px 18px 14px;
      position: relative;
      overflow: hidden;

      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #f3c57d 0%, #b16f20 100%);

    const countryOrder = ["it", "fr", "es", "ch", "us", "uk", "ca"];

    function fillList(el, items) {
      el.innerHTML = items.map(item => `<li>${item}</li>`).join("");
    }

    function renderKickers(items) {
      const grid = document.getElementById("kickerGrid");
      grid.innerHTML = items
        .map(item => `<div class="kicker"><strong>${item.title}</strong><p>${item.text}</p></div>`)
        .join("");
    }

    function renderCountries(t) {
      const grid = document.getElementById("countryGrid");
      grid.innerHTML = countryOrder
        .map(code => {
          const data = t.countries[code];
          const bullets = data.bullets.map(item => `<li>${item}</li>`).join("");
          return `<section class="country-card" data-country="${code}"><h3>${data.name}</h3><p>${data.text}</p><ul>${bullets}</ul></section>`;
        })
        .join("");
    }

    function renderFaq(items) {
      const faqList = document.getElementById("faqList");
      faqList.innerHTML = items
        .map(item => `<article class="faq-item"><h3>${item.q}</h3><p>${item.a}</p></article>`)
        .join("");
    }

    function applyCountry(country) {
      const cards = Array.from(document.querySelectorAll(".country-card"));
      cards.forEach(card => {
        const show = country === "all" || card.dataset.country === country;
        card.classList.toggle("hidden", !show);
        card.classList.toggle("active", show && country !== "all");
      });
    }

    function fillCountryOptions(options, selectedValue) {
      countrySelect.innerHTML = options
        .map(opt => `<option value="${opt.value}" ${opt.value === selectedValue ? "selected" : ""}>${opt.label}</option>`)
        .join("");
    }

    function applyLanguage(langCode) {
      const t = i18n[langCode] || i18n.it;
      const selectedCountry = countrySelect.value || "all";

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;
      descMeta.setAttribute("content", t.metaDescription);

      document.getElementById("eyebrow").textContent = t.eyebrow;
      document.getElementById("countryLabel").textContent = t.countryLabel;
      document.getElementById("langLabel").textContent = t.langLabel;
      document.getElementById("title").textContent = t.title;
      document.getElementById("sub").textContent = t.sub;
      document.getElementById("lead").textContent = t.lead;

      renderKickers(t.kickers);

      document.getElementById("formulaTitle").textContent = t.formulaTitle;
      document.getElementById("formulaCopy").textContent = t.formulaCopy;
      document.getElementById("formulaBox").textContent = t.formulaBox;
      document.getElementById("formulaExample").textContent = t.formulaExample;

      document.getElementById("strategyTitle").textContent = t.strategyTitle;
      fillList(document.getElementById("strategyList"), t.strategy);
      document.getElementById("note").textContent = t.note;

      document.getElementById("countryTitle").textContent = t.countryTitle;
      document.getElementById("countryCopy").textContent = t.countryCopy;
      renderCountries(t);

      document.getElementById("simTitle").textContent = t.simTitle;
      document.getElementById("simCopy").textContent = t.simCopy;
      document.getElementById("simExtra").textContent = t.simExtra;
      document.getElementById("simBoxLabel").textContent = t.simBoxLabel;
      document.getElementById("simBoxText").textContent = t.simBoxText;

      document.getElementById("stepsTitle").textContent = t.stepsTitle;
      fillList(document.getElementById("stepsList"), t.steps);

      document.getElementById("faqTitle").textContent = t.faqTitle;
      renderFaq(t.faq);

      document.getElementById("ctaMain").textContent = t.ctaMain;
      document.getElementById("ctaSecondary").textContent = t.ctaSecondary;
      document.getElementById("footerText").textContent = t.footer;

      fillCountryOptions(t.countryOptions, selectedCountry);
      applyCountry(selectedCountry);
    }

    countrySelect.addEventListener("change", event => {
      applyCountry(event.target.value);
    });

    langSelect.addEventListener("change", event => {
      applyLanguage(event.target.value);
    });

    langSelect.value = "en";
    applyLanguage("en");
    countrySelect.value = "all";
    applyCountry("all");
